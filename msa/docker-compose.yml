services:
  mysql:
    image: mysql:8.0
    container_name: deepmesh-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: auth_db # mysql 컨테이너 생성 시에는 auth_db 데이터베이스만 생성
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql

  auth-service:
    image: kimgooner/auth-service:v2
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&createDatabaseIfNotExist=true
      # createDatabaseIfNotExist 파라미터를 각 db에 적용하여 없을 경우 데이터베이스 자동 생성.
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

  comment-service:
    image: kimgooner/comment-service:v4
    build:
      context: ./backend/comment-service
      dockerfile: Dockerfile
    container_name: comment-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/comments_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8080"

  post-service:
    image: kimgooner/post-service:v4
    build:
      context: ./backend/post-service
      dockerfile: Dockerfile
    container_name: post-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/posts_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:8080"

  frontend:
    image: kimgooner/frontend:v3
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # docker-compose 환경: 각 백엔드가 개별 포트로 노출됨(ingress 없음).
        # 빈 문자열이면 base URL 이 ""(같은 오리진)이 되어 API 호출이 깨지므로 실제 포트를 지정.
        VITE_AUTH_API_URL: "http://localhost:8080"
        VITE_POST_API_URL: "http://localhost:8082"
        VITE_COMMENT_API_URL: "http://localhost:8081"
    container_name: frontend
    ports:
      - "3000:80"

volumes:
  mysql-data:
