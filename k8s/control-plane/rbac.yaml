apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane-sa
  namespace: deepmesh
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: deepmesh-control-plane
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: deepmesh-control-plane-binding
subjects:
  - kind: ServiceAccount
    name: control-plane-sa
    namespace: deepmesh
roleRef:
  kind: ClusterRole
  name: deepmesh-control-plane
  apiGroup: rbac.authorization.k8s.io
