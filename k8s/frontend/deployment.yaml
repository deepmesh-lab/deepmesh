apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: deepmesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: uicheolshin/frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: VITE_AUTH_API_URL
              valueFrom:
                configMapKeyRef:
                  name: deepmesh-config
                  key: AUTH_SERVICE_URL
            - name: VITE_POST_API_URL
              valueFrom:
                configMapKeyRef:
                  name: deepmesh-config
                  key: POST_SERVICE_URL
            - name: VITE_COMMENT_API_URL
              valueFrom:
                configMapKeyRef:
                  name: deepmesh-config
                  key: COMMENT_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
