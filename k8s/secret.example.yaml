# secret.example.yaml
# 실제 secret.yaml은 gitignore 처리됨. 아래 방법 중 하나로 생성하라.
#
# 방법 1: kubectl 명령으로 직접 생성 (권장)
#   kubectl create secret generic deepmesh-secret \
#     --namespace=deepmesh \
#     --from-literal=MYSQL_ROOT_PASSWORD='<your-password>' \
#     --from-literal=JWT_SECRET='<your-jwt-secret>'
#
# 방법 2: 이 파일을 복사해서 secret.yaml로 저장 후 값 채우기
#   cp k8s/secret.example.yaml k8s/secret.yaml
#   # secret.yaml 열어서 <...> 값 채운 뒤:
#   kubectl apply -f k8s/secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: deepmesh-secret
  namespace: deepmesh
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "<your-mysql-password>"
  JWT_SECRET: "<your-jwt-secret-key>"
